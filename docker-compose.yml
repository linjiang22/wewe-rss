version: '3.9'

services:
  db:
    image: docker.m.daocloud.io/library/mysql:8.3.0
    command: --mysql-native-password=ON
    environment:
      # 请修改为自己的密码
      MYSQL_ROOT_PASSWORD: 123456
      TZ: 'Asia/Shanghai'
      MYSQL_DATABASE: 'wewe-rss'
    # ports:
    #   - 13306:3306
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 45s
      interval: 10s
      retries: 10

  app:
    build:
      context: .
      target: app
    ports:
      - 4000:4000
    depends_on:
      db:
        condition: service_healthy
    environment:
      # 数据库连接地址
      - DATABASE_URL=mysql://root:123456@db:3306/wewe-rss?schema=public&connect_timeout=30&pool_timeout=30&socket_timeout=30
      # 服务接口请求授权码
      - AUTH_CODE=123567
      # 提取全文内容模式
      # - FEED_MODE=fulltext
      # 定时更新订阅源Cron表达式
      # - CRON_EXPRESSION=35 5,17 * * *
      # 定时检查微信读书账号登录状态，失效后发送飞书登录卡片
      - LOGIN_CHECK_CRON=${LOGIN_CHECK_CRON:-0 */6 * * *}
      - LOGIN_CHECK_ENABLED=${LOGIN_CHECK_ENABLED:-true}
      - LOGIN_CHECK_MP_ID=${LOGIN_CHECK_MP_ID:-}
      # 服务接口请求限制，每分钟请求次数
      # - MAX_REQUEST_PER_MINUTE=60
      # 外网访问时，需设置为服务器的公网 IP 或者域名地址
      # - SERVER_ORIGIN_URL=http://localhost:4000
      # 飞书登录失效通知
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - FEISHU_RECEIVE_ID=${FEISHU_RECEIVE_ID:-}
      - FEISHU_RECEIVE_ID_TYPE=${FEISHU_RECEIVE_ID_TYPE:-chat_id}
      - FEISHU_BASE_URL=${FEISHU_BASE_URL:-https://open.feishu.cn}

networks:
  wewe-rss:

volumes:
  db_data:
