version: '3.9'

services:
  app:
    image: cooderl/wewe-rss-sqlite:latest
    ports:
      - 4000:4000
    environment:
      # 数据库连接地址
      # - DATABASE_URL=file:../data/wewe-rss.db
      - DATABASE_TYPE=sqlite
      # 服务接口请求授权码
      - AUTH_CODE=123567
      # 提取全文内容模式
      # - FEED_MODE=fulltext
      # 定时更新订阅源Cron表达式
      # - CRON_EXPRESSION=35 5,17 * * *
      # 定时检查微信读书账号登录状态，失效后发送飞书登录卡片
      - LOGIN_CHECK_CRON=${LOGIN_CHECK_CRON:-0 * * * * *}
      - LOGIN_CHECK_ENABLED=${LOGIN_CHECK_ENABLED:-true}
      - LOGIN_CHECK_START_TIME=${LOGIN_CHECK_START_TIME:-10:20}
      - LOGIN_CHECK_INTERVAL_MINUTES=${LOGIN_CHECK_INTERVAL_MINUTES:-3}
      - LOGIN_CARD_COOLDOWN_SECONDS=${LOGIN_CARD_COOLDOWN_SECONDS:-170}
      - LOGIN_CARD_POLL_TIMEOUT_SECONDS=${LOGIN_CARD_POLL_TIMEOUT_SECONDS:-150}
      - LOGIN_CARD_MAX_SENDS_PER_DAY=${LOGIN_CARD_MAX_SENDS_PER_DAY:-5}
      - LOGIN_CHECK_MP_ID=${LOGIN_CHECK_MP_ID:-}
      # 服务接口请求限制，每分钟请求次数
      # - MAX_REQUEST_PER_MINUTE=60
      # 外网访问时，需设置为服务器的公网 IP 或者域名地址
      # - SERVER_ORIGIN_URL=http://localhost:4000
      # 飞书登录失效通知
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - FEISHU_RECEIVE_ID=${FEISHU_RECEIVE_ID:-}
      - FEISHU_RECEIVE_ID_TYPE=${FEISHU_RECEIVE_ID_TYPE:-chat_id}
      - FEISHU_BASE_URL=${FEISHU_BASE_URL:-https://open.feishu.cn}

    volumes:
      # 映射数据库文件存储位置，容器重启后不丢失
      - ./data:/app/data
